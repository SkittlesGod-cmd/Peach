kind = "web"
previewPath = "/"
title = "Aura — AI Brand Intelligence"
version = "1.0.0"
id = "artifacts/aura-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23226

[services.development]
run = "pnpm --filter @workspace/aura-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-landing", "run", "build" ]
publicDir = "artifacts/aura-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23226"
BASE_PATH = "/"
