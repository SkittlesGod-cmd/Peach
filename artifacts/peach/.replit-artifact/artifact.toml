kind = "web"
previewPath = "/"
title = "Peach"
version = "1.0.0"
id = "artifacts/peach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23226

[services.development]
run = "pnpm --filter @workspace/peach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/peach", "run", "build" ]
publicDir = "artifacts/peach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23226"
BASE_PATH = "/"
